name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-key
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm typecheck

      - run: pnpm test:run

      # `pnpm build` is intentionally omitted here: page-level data fetching
      # talks to Supabase during static generation, and CI does not have
      # real credentials. Add NEXT_PUBLIC_SUPABASE_URL / _ANON_KEY as repo
      # secrets and re-enable this step to verify prod builds in CI.
