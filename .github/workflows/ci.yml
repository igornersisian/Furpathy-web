name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-key
      # Short-circuits Supabase fetches so `next build` doesn't need real creds.
      # See lib/supabase.ts — every query resolves to an empty array.
      SUPABASE_BUILD_STUB: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Production-dependency audit. Dev-only advisories are noisy and
      # slower to triage — gate on prod only.
      - run: pnpm audit --prod --audit-level=high

      - run: pnpm format:check

      - run: pnpm lint

      - run: pnpm typecheck

      - run: pnpm test:coverage

      - run: pnpm build
